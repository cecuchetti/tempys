root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/worker"
cmd = "go build -o ./tmp/worker ."
full_bin = "./tmp/worker"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor"]
delay = 1000

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"