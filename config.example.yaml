share:
    # (Obligatorio) Secreto de descarga; cada vez que se decrementa el contador de descargas se genera un JWT de descarga con este secreto (válido 1 h). Con ese token puedes descargar en varios hilos sin descontar varias veces el límite.
    download_secret: A^PPoz3ygb94BbKSM
    # Ventana del token de descarga emitido; por defecto 12 h. Tras expirar el archivo, se borra del servidor 1 h después; por defecto 12+1=13 h.
    download_window: 12
    # (Obligatorio) Sal usada al aplicar hash a la contraseña.
    password_salt: m9b@Fg&v8!oBc^dSy

upload:
    # Ruta donde se guardan los archivos subidos.
    path: /upload
    # Capacidad máxima de subida de la instancia; admite valores legibles (p. ej. 1TiB, 500GiB). Usa GiB, no GB: GiB cuenta 1024 bytes, GB 1000.
    maximum: 100GiB

redis:
    # (Obligatorio) URL de Redis.
    url: redis://redis:6379/0

# Información básica del sitio
site:
    # Obligatorio: tu dominio público.
    url: http://localhost:5000
    title:
        'en': '015'
    desc:
        'en': '015 is an open-source temporary file sharing platform project that supports uploading, downloading, and sharing files and text.'
    icon: '/logo.png'
    bg_url: 'https://img.fudaoyuan.icu/api/1/random/?scale_min=1.5&webp=true&md=false&format=302'

# Página "Acerca de"
